<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>К себе нежно — Проекты и задачи</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #F0E8FA;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    padding: 24px 16px;
  }

  .device {
    background: #FAF7FE;
    border-radius: 48px;
    border: 8px solid #1A0A2E;
    width: 360px;
    height: 760px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    box-shadow: 0 32px 80px rgba(45,27,78,0.18);
  }

  /* ── Статус бар ── */
  .status-bar {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    flex-shrink: 0;
  }
  .status-time { font-size: 15px; font-weight: 600; color: #2D1B4E; }
  .status-icons { display: flex; gap: 6px; align-items: center; color: #2D1B4E; font-size: 15px; }

  /* ── Шапка ── */
  .header {
    padding: 0 24px 14px;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 22px;
    font-weight: 600;
    color: #2D1B4E;
    letter-spacing: -0.4px;
    margin-bottom: 12px;
  }

  /* ── Навигация по датам ── */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 0;
    background: #fff;
    border-radius: 16px;
    padding: 6px 8px;
    user-select: none;
  }
  .date-arrow {
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #A855F7;
    font-size: 18px;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .date-arrow:hover { background: #F3EEFF; }
  .date-arrow:active { background: #EDE9FE; }

  .date-strip {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    overflow: hidden;
    cursor: grab;
  }
  .date-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 5px 10px;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .date-chip .wd { font-size: 10px; color: #C4B8D6; font-weight: 500; text-transform: uppercase; }
  .date-chip .dd { font-size: 15px; font-weight: 600; color: #9B8DB0; }
  .date-chip .dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; margin-top: 2px; }
  .date-chip:hover { background: #F7F3FB; }
  .date-chip.active { background: #A855F7; }
  .date-chip.active .wd { color: rgba(255,255,255,0.7); }
  .date-chip.active .dd { color: #fff; }
  .date-chip.has-tasks .dot { background: #C084FC; }
  .date-chip.active .dot { background: rgba(255,255,255,0.6); }

  /* ── Скролл-область задач ── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 0 20px;
    -webkit-overflow-scrolling: touch;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* Анимация смены дня */
  .tasks-container {
    transition: opacity 0.22s, transform 0.22s;
  }
  .tasks-container.slide-left  { opacity: 0; transform: translateX(-18px); }
  .tasks-container.slide-right { opacity: 0; transform: translateX(18px); }

  /* ── Задача ── */
  .task-item {
    background: #fff;
    border-radius: 16px;
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: transform 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .task-item:active { transform: scale(0.985); }

  .task-check {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #E5D8F5;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.18s, border-color 0.18s, transform 0.18s;
    cursor: pointer;
    margin-top: 1px;
  }
  .task-check i { font-size: 12px; color: transparent; transition: color 0.18s; }
  .task-check.done { background: #A855F7; border-color: #A855F7; }
  .task-check.done i { color: #fff; }

  .task-body { flex: 1; min-width: 0; }
  .task-text {
    font-size: 14px;
    color: #2D1B4E;
    line-height: 1.35;
    transition: color 0.18s;
  }
  .task-text.done-text { text-decoration: line-through; color: #C4B8D6; }
  .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .task-time { font-size: 11px; color: #C4B8D6; }

  .priority {
    display: flex;
    align-items: center;
    gap: 3px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .priority span.lbl { font-size: 10px; font-weight: 500; }
  .p-fire .lbl  { color: #D97706; }
  .p-plan .lbl  { color: #9B8DB0; }
  .p-calm .lbl  { color: #16A34A; }

  /* ── Конец списка ── */
  .tasks-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0 16px;
  }
  .tasks-footer-text {
    font-size: 12px;
    color: #C4B8D6;
    font-style: italic;
  }
  .calendar-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #F3EEFF;
    border-radius: 12px;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .calendar-btn:hover { background: #EDE9FE; }
  .calendar-btn i { font-size: 14px; color: #A855F7; }
  .calendar-btn span { font-size: 12px; color: #A855F7; font-weight: 500; }

  /* ── Прогресс-бар (график) ── */
  .chart-section {
    flex-shrink: 0;
    padding: 0 20px 12px;
  }
  .chart-card {
    background: #fff;
    border-radius: 20px;
    padding: 14px 16px 10px;
  }
  .chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .chart-title { font-size: 12px; font-weight: 600; color: #9B8DB0; text-transform: uppercase; letter-spacing: 1px; }
  .chart-total { font-size: 12px; color: #A855F7; font-weight: 500; }
  .chart-wrap { position: relative; height: 72px; }
  canvas#progressChart { width: 100% !important; height: 72px !important; }

  /* ── Нижняя панель ── */
  .bottom-panel {
    flex-shrink: 0;
    padding: 0 20px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr 64px 1fr 1fr;
    gap: 8px;
    align-items: center;
  }
  .panel-btn {
    background: #fff;
    border-radius: 18px;
    padding: 12px 6px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    min-height: 68px;
    justify-content: center;
  }
  .panel-btn:active { transform: scale(0.93); background: #F3EEFF; }
  .panel-btn.active-tab { background: #F3EEFF; }
  .panel-btn i { font-size: 21px; color: #A855F7; }
  .panel-btn span { font-size: 10px; color: #9B8DB0; font-weight: 500; text-align: center; line-height: 1.3; }
  .panel-btn.active-tab span { color: #A855F7; }

  .mic-center {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, #C084FC, #A855F7);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; border: none;
    box-shadow: 0 4px 20px rgba(168,85,247,0.38);
    transition: transform 0.15s, box-shadow 0.2s;
    justify-self: center;
  }
  .mic-center:hover { transform: scale(1.07); }
  .mic-center:active { transform: scale(0.92); }
  .mic-center i { font-size: 26px; color: #fff; }
  .mic-center.recording { animation: micPulse 1s ease-in-out infinite; }
  @keyframes micPulse {
    0%,100% { box-shadow: 0 4px 20px rgba(168,85,247,0.38); }
    50%      { box-shadow: 0 4px 36px rgba(168,85,247,0.7), 0 0 0 10px rgba(168,85,247,0.1); }
  }

  /* ── Попап — мини-календарь ── */
  .cal-overlay {
    position: absolute; inset: 0;
    background: rgba(45,27,78,0.35);
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
    z-index: 20;
    border-radius: 40px;
  }
  .cal-overlay.open { opacity: 1; pointer-events: all; }
  .cal-sheet {
    background: #FAF7FE;
    border-radius: 28px 28px 0 0;
    width: 100%;
    padding: 20px 20px 28px;
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
  }
  .cal-overlay.open .cal-sheet { transform: translateY(0); }
  .cal-drag { width: 36px; height: 4px; background: #E5D8F5; border-radius: 4px; margin: 0 auto 16px; }
  .cal-title { font-size: 16px; font-weight: 600; color: #2D1B4E; margin-bottom: 14px; text-align: center; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
  .cal-wd { font-size: 10px; color: #C4B8D6; text-align: center; font-weight: 600; padding-bottom: 4px; }
  .cal-day {
    aspect-ratio: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-radius: 10px; cursor: pointer; font-size: 13px;
    color: #6B5C82; font-weight: 500;
    transition: background 0.15s;
    gap: 2px;
  }
  .cal-day:hover { background: #F3EEFF; }
  .cal-day.today { background: #A855F7; color: #fff; }
  .cal-day.today .cdot { background: rgba(255,255,255,0.5) !important; }
  .cal-day.has .cdot { display: block; }
  .cdot { display: none; width: 4px; height: 4px; border-radius: 50%; background: #C084FC; }
  .cal-day.empty { cursor: default; }

  @keyframes checkPop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.35); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>
<div class="device">

  <!-- Статус -->
  <div class="status-bar">
    <span class="status-time" id="clock">9:41</span>
    <div class="status-icons">
      <i class="ti ti-wifi" aria-hidden="true"></i>
      <i class="ti ti-battery" aria-hidden="true"></i>
    </div>
  </div>

  <!-- Шапка -->
  <div class="header">
    <div class="header-title">Проекты / Задачи</div>
    <div class="date-nav" id="dateNav">
      <div class="date-arrow" onclick="shiftDay(-1)" aria-label="Предыдущий день">
        <i class="ti ti-chevron-left" aria-hidden="true"></i>
      </div>
      <div class="date-strip" id="dateStrip"></div>
      <div class="date-arrow" onclick="shiftDay(1)" aria-label="Следующий день">
        <i class="ti ti-chevron-right" aria-hidden="true"></i>
      </div>
    </div>
  </div>

  <!-- Задачи (скролл) -->
  <div class="scroll-area" id="scrollArea">
    <div class="tasks-container" id="tasksContainer"></div>
    <div class="tasks-footer">
      <span class="tasks-footer-text" id="footerText">…это все задачи на сегодня</span>
      <div class="calendar-btn" onclick="openCal()">
        <i class="ti ti-calendar" aria-hidden="true"></i>
        <span>Календарь</span>
      </div>
    </div>
  </div>

  <!-- График -->
  <div class="chart-section">
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">Выполнено задач</span>
        <span class="chart-total" id="chartTotal">за неделю: 0</span>
      </div>
      <div class="chart-wrap">
        <canvas id="progressChart"></canvas>
      </div>
    </div>
  </div>

  <!-- Нижняя панель -->
  <div class="bottom-panel">
    <div class="panel-btn" onclick="goScreen('events')">
      <i class="ti ti-calendar-event" aria-hidden="true"></i>
      <span>События</span>
    </div>
    <div class="panel-btn" onclick="goScreen('main')">
      <i class="ti ti-home" aria-hidden="true"></i>
      <span>Главная</span>
    </div>
    <button class="mic-center" id="micBtn" onclick="toggleMic()" aria-label="Надиктовать задачу">
      <i class="ti ti-microphone" aria-hidden="true"></i>
    </button>
    <div class="panel-btn" onclick="goScreen('people')">
      <i class="ti ti-users" aria-hidden="true"></i>
      <span>Люди</span>
    </div>
    <div class="panel-btn" onclick="goScreen('summary')">
      <i class="ti ti-chart-bar" aria-hidden="true"></i>
      <span>Саммари</span>
    </div>
  </div>

  <!-- Мини-календарь (попап снизу) -->
  <div class="cal-overlay" id="calOverlay" onclick="closeCal(event)">
    <div class="cal-sheet">
      <div class="cal-drag"></div>
      <div class="cal-title">Июнь 2026</div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
/* ── Данные ── */
const today = new Date();
let activeOffset = 0; // 0 = сегодня, -1 = вчера, +1 = завтра

const TASKS = {
  "-1": [
    { id:1, text:"Купить хлеб",          done:true,  priority:"calm", time:"" },
    { id:2, text:"Сделать зарядку",       done:true,  priority:"plan", time:"08:00" },
    { id:3, text:"Написать диплом",        done:false, priority:"fire", time:"" },
  ],
  "0": [
    { id:1, text:"Позвонить маме",         done:false, priority:"fire", time:"" },
    { id:2, text:"Купить подарок Ане",     done:false, priority:"fire", time:"" },
    { id:3, text:"Утренняя пробежка",      done:true,  priority:"plan", time:"07:30" },
    { id:4, text:"Прочитать 20 страниц",   done:false, priority:"plan", time:"" },
    { id:5, text:"Записаться к врачу",     done:false, priority:"calm", time:"" },
    { id:6, text:"Полить кактус",          done:true,  priority:"calm", time:"" },
    { id:7, text:"Написать в чат команды", done:false, priority:"plan", time:"11:00" },
  ],
  "1": [
    { id:1, text:"Встреча с Машей",        done:false, priority:"fire", time:"15:00" },
    { id:2, text:"Купить виски",           done:false, priority:"calm", time:"" },
    { id:3, text:"Пересадить кактус",      done:false, priority:"calm", time:"" },
  ],
  "2": [
    { id:1, text:"Зарядка",               done:false, priority:"plan", time:"08:00" },
    { id:2, text:"Звонок с клиентом",     done:false, priority:"fire", time:"14:00" },
  ]
};

const DONE_BY_DAY = [1, 3, 2, 4, 5, 2, 3]; // вт–пн (последние 7 дней)

/* ── Приоритеты ── */
const PRIO = {
  fire: { emoji:"🔥", label:"Горит",   cls:"p-fire" },
  plan: { emoji:"💛", label:"Планово", cls:"p-plan" },
  calm: { emoji:"🌿", label:"Спокойно",cls:"p-calm" },
};

/* ── Часы ── */
function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
}
updateClock(); setInterval(updateClock, 30000);

/* ── Даты: полоса ── */
const MONTHS_RU = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const WD_SHORT  = ['вс','пн','вт','ср','чт','пт','сб'];

function getDateForOffset(offset) {
  const d = new Date(today);
  d.setDate(d.getDate() + offset);
  return d;
}

function renderDateStrip() {
  const strip = document.getElementById('dateStrip');
  strip.innerHTML = '';
  for (let o = activeOffset - 2; o <= activeOffset + 2; o++) {
    const d = getDateForOffset(o);
    const chip = document.createElement('div');
    chip.className = 'date-chip' +
      (o === activeOffset ? ' active' : '') +
      (TASKS[String(o)] ? ' has-tasks' : '');
    chip.innerHTML =
      `<span class="wd">${WD_SHORT[d.getDay()]}</span>` +
      `<span class="dd">${d.getDate()}</span>` +
      `<div class="dot"></div>`;
    chip.onclick = () => shiftDay(o - activeOffset);
    strip.appendChild(chip);
  }
}

/* ── Задачи: рендер ── */
function renderTasks(direction) {
  const container = document.getElementById('tasksContainer');
  const key = String(activeOffset);
  const tasks = (TASKS[key] || []).slice(); // копия

  // анимация ухода
  if (direction) {
    container.classList.add(direction === 1 ? 'slide-left' : 'slide-right');
  }

  setTimeout(() => {
    container.innerHTML = '';
    tasks.forEach(t => {
      const el = document.createElement('div');
      el.className = 'task-item';
      el.dataset.id = t.id;
      el.innerHTML = `
        <div class="task-check ${t.done ? 'done' : ''}" onclick="toggleTask(this,event)">
          <i class="ti ti-check" aria-hidden="true"></i>
        </div>
        <div class="task-body">
          <div class="task-text ${t.done ? 'done-text' : ''}">${t.text}</div>
          ${t.time ? `<div class="task-meta"><span class="task-time"><i class="ti ti-clock" style="font-size:10px"></i> ${t.time}</span></div>` : ''}
        </div>
        <div class="priority ${PRIO[t.priority].cls}">
          <span>${PRIO[t.priority].emoji}</span>
          <span class="lbl">${PRIO[t.priority].label}</span>
        </div>`;
      container.appendChild(el);
    });

    const d = getDateForOffset(activeOffset);
    const isToday = activeOffset === 0;
    document.getElementById('footerText').textContent =
      isToday ? '…это все задачи на сегодня' :
      `…это все задачи на ${d.getDate()} ${MONTHS_RU[d.getMonth()]}`;

    container.classList.remove('slide-left','slide-right');
    updateChart();
  }, direction ? 180 : 0);
}

function toggleTask(checkEl, e) {
  e.stopPropagation();
  checkEl.classList.toggle('done');
  checkEl.style.animation = 'none';
  requestAnimationFrame(() => {
    checkEl.style.animation = 'checkPop 0.26s ease';
  });
  const textEl = checkEl.closest('.task-item').querySelector('.task-text');
  textEl.classList.toggle('done-text', checkEl.classList.contains('done'));
  updateChart();
}

/* ── Навигация по дням ── */
function shiftDay(delta) {
  if (delta === 0) return;
  activeOffset += delta;
  renderDateStrip();
  renderTasks(delta > 0 ? 1 : -1);
}

/* ── Свайп по области задач ── */
let touchStartX = 0;
document.getElementById('scrollArea').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('scrollArea').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) shiftDay(dx < 0 ? 1 : -1);
}, { passive: true });

/* ── Мышиный свайп для десктопа ── */
let mouseStartX = 0, isDragging = false;
const sa = document.getElementById('scrollArea');
sa.addEventListener('mousedown', e => { mouseStartX = e.clientX; isDragging = true; });
sa.addEventListener('mouseup', e => {
  if (!isDragging) return; isDragging = false;
  const dx = e.clientX - mouseStartX;
  if (Math.abs(dx) > 50) shiftDay(dx < 0 ? 1 : -1);
});

/* ── График ── */
let chartInstance = null;
function updateChart() {
  const key = String(activeOffset);
  const tasks = TASKS[key] || [];
  const doneToday = tasks.filter(t => {
    const el = document.querySelector(`.task-item[data-id="${t.id}"] .task-check`);
    return el ? el.classList.contains('done') : t.done;
  }).length;

  const labels = [];
  const data = [...DONE_BY_DAY.slice(0,6), doneToday];
  for (let i = 6; i >= 0; i--) {
    const d = getDateForOffset(-i);
    labels.push(d.getDate() + ' ' + MONTHS_RU[d.getMonth()]);
  }

  const total = data.reduce((a,b) => a+b, 0);
  document.getElementById('chartTotal').textContent = 'за неделю: ' + total;

  if (chartInstance) { chartInstance.destroy(); }
  const ctx = document.getElementById('progressChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: '#A855F7',
        backgroundColor: 'rgba(168,85,247,0.08)',
        borderWidth: 2.5,
        pointBackgroundColor: '#A855F7',
        pointRadius: 4,
        pointHoverRadius: 6,
        tension: 0.4,
        fill: true,
      }]
    },
    options: {
      responsive: false,
      animation: { duration: 500 },
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ctx.parsed.y + ' задач' }
      }},
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 9, family: 'Inter' }, color: '#C4B8D6', maxRotation: 0 } },
        y: { grid: { color: '#F3EEFF' }, ticks: { font: { size: 9, family: 'Inter' }, color: '#C4B8D6', stepSize: 1 }, beginAtZero: true }
      }
    }
  });
}

/* ── Мини-календарь ── */
function buildCalGrid() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['пн','вт','ср','чт','пт','сб','вс'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-wd'; el.textContent = d;
    grid.appendChild(el);
  });
  const year = today.getFullYear(), month = today.getMonth();
  const firstDay = new Date(year, month, 1).getDay(); // 0=вс
  const totalDays = new Date(year, month+1, 0).getDate();
  const startBlanks = (firstDay === 0 ? 6 : firstDay - 1);
  for (let i = 0; i < startBlanks; i++) {
    const el = document.createElement('div'); el.className='cal-day empty'; grid.appendChild(el);
  }
  const hasTasks = new Set([14,15,18,19,20,21,22,23,25]);
  for (let d = 1; d <= totalDays; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day' + (d === today.getDate() ? ' today' : '') + (hasTasks.has(d) ? ' has' : '');
    el.innerHTML = d + '<div class="cdot"></div>';
    const offset = d - today.getDate();
    el.onclick = () => { shiftDay(offset - activeOffset); closeCal(); };
    grid.appendChild(el);
  }
}

function openCal() {
  buildCalGrid();
  document.getElementById('calOverlay').classList.add('open');
}
function closeCal(e) {
  if (!e || e.target === document.getElementById('calOverlay')) {
    document.getElementById('calOverlay').classList.remove('open');
  }
}

/* ── Микрофон ── */
let micActive = false;
function toggleMic() {
  micActive = !micActive;
  document.getElementById('micBtn').classList.toggle('recording', micActive);
}

function goScreen(name) {
  const labels = { main:'Главная', events:'События', people:'Люди', summary:'Саммари' };
  alert('→ ' + (labels[name] || name));
}

/* ── Инициализация ── */
renderDateStrip();
renderTasks(0);
</script>
