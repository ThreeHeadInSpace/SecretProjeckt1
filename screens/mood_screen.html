<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>К себе нежно — Экран настроения</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #F0E8FA;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    padding: 24px;
  }

  .device {
    background: #FAF7FE;
    border-radius: 48px;
    border: 8px solid #1A0A2E;
    width: 360px;
    min-height: 720px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    box-shadow: 0 32px 80px rgba(45,27,78,0.18);
  }

  .status-bar {
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    flex-shrink: 0;
  }
  .status-time { font-size: 15px; font-weight: 600; color: #2D1B4E; }
  .status-icons { display: flex; gap: 6px; align-items: center; color: #2D1B4E; font-size: 15px; }

  .skip-btn {
    position: absolute;
    top: 54px;
    right: 24px;
    font-size: 14px;
    color: #C4B8D6;
    font-weight: 500;
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.2s;
  }
  .skip-btn:hover { color: #9B8DB0; }

  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 28px 28px;
  }

  /* ── Клякса ── */
  .blob-wrap {
    width: 130px;
    height: 130px;
    position: relative;
    margin-bottom: 28px;
    margin-top: 8px;
  }
  .blob-svg {
    width: 100%;
    height: 100%;
    animation: blobFloat 3.8s ease-in-out infinite;
  }
  @keyframes blobFloat {
    0%, 100% { transform: translateY(0px) scale(1); }
    50%       { transform: translateY(-8px) scale(1.04); }
  }
  .star {
    position: absolute;
    color: #C084FC;
    animation: starPulse 2.2s ease-in-out infinite;
  }
  .star-1 { top: -6px; right: 8px; font-size: 18px; animation-delay: 0s; }
  .star-2 { top: 10px; right: -12px; font-size: 12px; animation-delay: 0.5s; }
  .star-3 { top: -10px; left: 16px; font-size: 13px; animation-delay: 0.9s; }
  .star-4 { bottom: 4px; left: -8px; font-size: 10px; animation-delay: 1.3s; color: #E879F9; }
  @keyframes starPulse {
    0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
    50%       { opacity: 0.4; transform: scale(0.65) rotate(20deg); }
  }

  /* ── Текст ── */
  .greeting {
    font-size: 14px;
    color: #9B8DB0;
    font-weight: 400;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }
  .question {
    font-size: 24px;
    font-weight: 600;
    color: #2D1B4E;
    text-align: center;
    line-height: 1.3;
    margin-bottom: 36px;
    letter-spacing: -0.5px;
    min-height: 64px;
    transition: opacity 0.35s, transform 0.35s;
  }
  .question.fade-out { opacity: 0; transform: translateY(8px); }
  .question.fade-in  { opacity: 1; transform: translateY(0); }

  /* ── Смайлики ── */
  .moods {
    display: flex;
    gap: 24px;
    margin-bottom: 36px;
  }
  .mood-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 9px;
    cursor: pointer;
    transition: transform 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .mood-face {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.25s, transform 0.25s, box-shadow 0.25s;
    border: 2.5px solid transparent;
  }
  .mood-face svg { width: 42px; height: 42px; }
  .mood-happy .mood-face  { background: #FFF0F6; }
  .mood-neutral .mood-face { background: #F5F1FA; }
  .mood-sad .mood-face    { background: #EEF2FF; }
  .mood-btn:hover .mood-face { transform: scale(1.1); }
  .mood-btn.active .mood-face { transform: scale(1.15); box-shadow: 0 0 0 4px rgba(192,132,252,0.2); }
  .mood-happy.active .mood-face  { background: #FDE8F0; border-color: #EC4899; }
  .mood-neutral.active .mood-face { background: #EDE9FE; border-color: #A855F7; }
  .mood-sad.active .mood-face    { background: #E0E7FF; border-color: #6366F1; }
  .mood-label {
    font-size: 12px;
    color: #9B8DB0;
    font-weight: 500;
  }
  .mood-btn.active .mood-label { color: #7C3AED; }

  /* ── Разделитель ── */
  .divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .divider-line { flex: 1; height: 1px; background: #EDE5F5; }
  .divider-text { font-size: 12px; color: #C4B8D6; white-space: nowrap; }

  /* ── Ввод ── */
  .input-row {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .chat-input {
    flex: 1;
    background: #fff;
    border: 1.5px solid #EDE5F5;
    border-radius: 24px;
    padding: 13px 18px;
    font-size: 15px;
    color: #2D1B4E;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .chat-input::placeholder { color: #C4B8D6; }
  .chat-input:focus { border-color: #C084FC; }
  .mic-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #C084FC, #A855F7);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    border: none;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(168,85,247,0.35);
  }
  .mic-btn:hover { transform: scale(1.06); box-shadow: 0 6px 20px rgba(168,85,247,0.45); }
  .mic-btn:active { transform: scale(0.94); }
  .mic-btn i { font-size: 20px; color: #fff; }

  /* ── Подсказка снизу ── */
  .bottom-hint {
    margin-top: 20px;
    font-size: 12px;
    color: #C4B8D6;
    text-align: center;
    line-height: 1.6;
    transition: color 0.3s;
    min-height: 38px;
  }
  .bottom-hint.selected { color: #A855F7; font-weight: 500; }
</style>
</head>
<body>

<div class="device">

  <div class="status-bar">
    <span class="status-time" id="clock">9:41</span>
    <div class="status-icons">
      <i class="ti ti-wifi" aria-hidden="true"></i>
      <i class="ti ti-battery" aria-hidden="true"></i>
    </div>
  </div>

  <span class="skip-btn" onclick="document.querySelector('.device').style.opacity='0.3'">Пропустить</span>

  <div class="main-content">

    <div class="blob-wrap">
      <span class="star star-1">✦</span>
      <span class="star star-2">✦</span>
      <span class="star star-3">✦</span>
      <span class="star star-4">✦</span>
      <svg class="blob-svg" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M65 10 C88 8, 118 22, 122 50 C126 76, 108 105, 80 118 C54 130, 18 120, 8 92 C-2 66, 10 28, 38 14 C50 8, 58 11, 65 10Z" fill="#C084FC" opacity="0.2"/>
        <path d="M65 16 C86 14, 112 26, 116 52 C120 76, 104 102, 78 114 C54 124, 22 115, 13 90 C5 67, 15 32, 40 19 C51 13, 58 17, 65 16Z" fill="#A855F7" opacity="0.5"/>
        <path d="M65 20 C84 18, 108 30, 111 54 C114 77, 99 101, 75 112 C52 122, 23 114, 15 90 C7 67, 17 35, 42 22 C53 16, 59 21, 65 20Z" fill="#9333EA"/>
        <!-- глаза -->
        <ellipse cx="52" cy="60" rx="5.5" ry="7" fill="#2D1B4E" opacity="0.9"/>
        <ellipse cx="80" cy="60" rx="5.5" ry="7" fill="#2D1B4E" opacity="0.9"/>
        <ellipse cx="54" cy="57" rx="2.2" ry="2.8" fill="white" opacity="0.65"/>
        <ellipse cx="82" cy="57" rx="2.2" ry="2.8" fill="white" opacity="0.65"/>
        <!-- улыбка -->
        <path d="M54 78 Q65 90 78 78" stroke="#2D1B4E" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85"/>
        <!-- румянец -->
        <ellipse cx="46" cy="74" rx="5" ry="3.5" fill="#F9A8D4" opacity="0.45"/>
        <ellipse cx="86" cy="74" rx="5" ry="3.5" fill="#F9A8D4" opacity="0.45"/>
      </svg>
    </div>

    <div class="greeting" id="greeting">Доброе утро ✦</div>

    <div class="question fade-in" id="question">Как себя чувствуешь<br>сегодня?</div>

    <div class="moods" role="group" aria-label="Выбери настроение">
      <div class="mood-btn mood-happy" onclick="selectMood(this,'happy')" role="button" tabindex="0" aria-label="Хорошо">
        <div class="mood-face">
          <svg viewBox="0 0 42 42" fill="none">
            <circle cx="21" cy="21" r="20" fill="#FDE8F0" stroke="#FBCFE8" stroke-width="1.2"/>
            <ellipse cx="15" cy="19" rx="2.6" ry="3.2" fill="#BE185D" opacity="0.85"/>
            <ellipse cx="27" cy="19" rx="2.6" ry="3.2" fill="#BE185D" opacity="0.85"/>
            <path d="M14 27 Q21 35 28 27" stroke="#BE185D" stroke-width="2.2" stroke-linecap="round" fill="none"/>
            <ellipse cx="13" cy="24" rx="3" ry="2.2" fill="#F9A8D4" opacity="0.5"/>
            <ellipse cx="29" cy="24" rx="3" ry="2.2" fill="#F9A8D4" opacity="0.5"/>
          </svg>
        </div>
        <span class="mood-label">Хорошо</span>
      </div>

      <div class="mood-btn mood-neutral" onclick="selectMood(this,'neutral')" role="button" tabindex="0" aria-label="Нормально">
        <div class="mood-face">
          <svg viewBox="0 0 42 42" fill="none">
            <circle cx="21" cy="21" r="20" fill="#EDE9FE" stroke="#DDD6FE" stroke-width="1.2"/>
            <ellipse cx="15" cy="18" rx="2.6" ry="3.2" fill="#7C3AED" opacity="0.75"/>
            <ellipse cx="27" cy="18" rx="2.6" ry="3.2" fill="#7C3AED" opacity="0.75"/>
            <path d="M15 28 L27 28" stroke="#7C3AED" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="mood-label">Нормально</span>
      </div>

      <div class="mood-btn mood-sad" onclick="selectMood(this,'sad')" role="button" tabindex="0" aria-label="Грустно">
        <div class="mood-face">
          <svg viewBox="0 0 42 42" fill="none">
            <circle cx="21" cy="21" r="20" fill="#E0E7FF" stroke="#C7D2FE" stroke-width="1.2"/>
            <ellipse cx="15" cy="18" rx="2.6" ry="3.2" fill="#4338CA" opacity="0.75"/>
            <ellipse cx="27" cy="18" rx="2.6" ry="3.2" fill="#4338CA" opacity="0.75"/>
            <path d="M14 30 Q21 23 28 30" stroke="#4338CA" stroke-width="2.2" stroke-linecap="round" fill="none"/>
            <ellipse cx="12.5" cy="25" rx="3" ry="2.2" fill="#A5B4FC" opacity="0.5"/>
            <ellipse cx="29.5" cy="25" rx="3" ry="2.2" fill="#A5B4FC" opacity="0.5"/>
          </svg>
        </div>
        <span class="mood-label">Грустно</span>
      </div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">или расскажи подробнее</span>
      <div class="divider-line"></div>
    </div>

    <div class="input-row">
      <input class="chat-input" type="text" placeholder="Напиши, как ты…" id="moodText" aria-label="Написать о своём настроении"/>
      <button class="mic-btn" aria-label="Надиктовать голосом">
        <i class="ti ti-microphone" aria-hidden="true"></i>
      </button>
    </div>

    <div class="bottom-hint" id="bottom-hint">
      Это только для тебя.<br>Можно пропустить — нажми выше.
    </div>

  </div>
</div>

<script>
  const questions = [
    "Как себя чувствуешь\nсегодня?",
    "Как настроение\nпрямо сейчас?",
    "Что у тебя\nна душе?",
    "Как ты сегодня,\nчестно?",
    "Всё хорошо\nс тобой?"
  ];
  let qi = 0;

  function updateGreeting() {
    const h = new Date().getHours();
    const el = document.getElementById('greeting');
    if      (h >= 5  && h < 12) el.textContent = 'Доброе утро ✦';
    else if (h >= 12 && h < 17) el.textContent = 'Добрый день ✦';
    else if (h >= 17 && h < 22) el.textContent = 'Добрый вечер ✦';
    else                         el.textContent = 'Доброй ночи ✦';
  }

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      String(now.getHours()).padStart(2,'0') + ':' +
      String(now.getMinutes()).padStart(2,'0');
  }

  function cycleQuestion() {
    const el = document.getElementById('question');
    el.classList.add('fade-out');
    setTimeout(() => {
      qi = (qi + 1) % questions.length;
      el.innerHTML = questions[qi].replace('\n','<br>');
      el.classList.remove('fade-out');
    }, 360);
  }

  function selectMood(el, mood) {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    const hint = document.getElementById('bottom-hint');
    const msgs = {
      happy:   '😊 Рада это слышать!',
      neutral: '🤍 Всё будет хорошо',
      sad:     '💜 Я здесь, можешь рассказать'
    };
    hint.textContent = msgs[mood];
    hint.classList.add('selected');
  }

  updateGreeting();
  updateClock();
  setInterval(updateClock, 30000);
  setInterval(cycleQuestion, 4500);
</script>
</body>
</html>
